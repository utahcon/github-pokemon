# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: github-pokemon
    binary: github-pokemon
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -w -s
      - -X github.com/utahcon/github-pokemon/cmd.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - CHANGELOG.md
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

release:
  github:
    owner: utahcon
    name: github-pokemon
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
